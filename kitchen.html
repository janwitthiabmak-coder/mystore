<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าจอรับออเดอร์ — ครัว</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.07);
    --primary: #ff4d4d;
    --primary-glow: rgba(255,77,77,0.25);
    --amber: #ffb347;
    --amber-glow: rgba(255,179,71,0.2);
    --green: #3ecf8e;
    --green-glow: rgba(62,207,142,0.2);
    --muted: #6b7280;
    --text: #f1f5f9;
    --text2: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Prompt',sans-serif; }
  body { background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; background:var(--surface);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:40px; height:40px; border-radius:12px; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; box-shadow:0 0 16px var(--primary-glow); }
  .header h1 { font-size:1.15rem; font-weight:700; }
  .header h1 span { color:var(--primary); }
  .header-right { display:flex; align-items:center; gap:16px; }
  .live-dot { display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--green); font-weight:600; }
  .live-dot::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 1.5s infinite; }
  .clock { font-size:0.95rem; color:var(--text2); font-weight:600; font-variant-numeric:tabular-nums; }

  .stats-bar { display:flex; gap:12px; padding:16px 28px; border-bottom:1px solid var(--border); overflow-x:auto; }
  .stats-bar::-webkit-scrollbar { display:none; }
  .stat { display:flex; flex-direction:column; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:12px 22px; min-width:100px; flex-shrink:0; }
  .stat-num { font-size:1.6rem; font-weight:800; line-height:1; }
  .stat-label { font-size:0.75rem; color:var(--text2); margin-top:4px; }
  .stat.new .stat-num { color:var(--primary); text-shadow:0 0 12px var(--primary-glow); }
  .stat.cooking .stat-num { color:var(--amber); text-shadow:0 0 12px var(--amber-glow); }
  .stat.done .stat-num { color:var(--green); text-shadow:0 0 12px var(--green-glow); }

  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:20px 28px 40px; max-width:1400px; margin:0 auto; }
  .col-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; font-size:0.95rem; font-weight:700; letter-spacing:0.03em; }
  .col-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .col-count { margin-left:auto; background:var(--surface2); border:1px solid var(--border); font-size:0.75rem; font-weight:700; padding:3px 10px; border-radius:20px; color:var(--text2); }

  .order-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:14px; transition:all 0.3s; position:relative; overflow:hidden; }
  .order-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:4px 0 0 4px; }
  .col-new .order-card::before { background:var(--primary); box-shadow:0 0 10px var(--primary-glow); }
  .col-cooking .order-card::before { background:var(--amber); box-shadow:0 0 10px var(--amber-glow); }
  .col-done .order-card::before { background:var(--green); box-shadow:0 0 10px var(--green-glow); }
  .order-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-2px); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .table-tag { display:flex; align-items:center; gap:6px; font-size:1.1rem; font-weight:800; }
  .table-tag i { font-size:0.85rem; color:var(--muted); }
  .time-ago { font-size:0.78rem; color:var(--text2); background:var(--surface2); padding:4px 10px; border-radius:20px; }
  .time-ago.urgent { color:var(--primary); background:rgba(255,77,77,0.1); animation:blink 1s infinite; }

  .items-list { margin-bottom:16px; }
  .order-item { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.92rem; }
  .order-item:last-child { border-bottom:none; }
  .item-name { font-weight:600; }
  .item-opts { font-size:0.78rem; color:var(--text2); margin-top:2px; }
  .item-qty { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:2px 10px; font-size:0.85rem; font-weight:700; flex-shrink:0; margin-left:10px; }

  .note-box { background:rgba(255,179,71,0.08); border:1px solid rgba(255,179,71,0.2); border-radius:10px; padding:8px 12px; font-size:0.82rem; color:var(--amber); margin-bottom:14px; display:flex; gap:8px; align-items:flex-start; }

  .card-actions { display:flex; gap:8px; }
  .btn-action { flex:1; padding:10px; border:none; border-radius:12px; font-size:0.88rem; font-weight:700; cursor:pointer; font-family:'Prompt',sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-action:active { transform:scale(0.96); }
  .btn-accept { background:var(--primary); color:#fff; box-shadow:0 4px 14px var(--primary-glow); }
  .btn-done { background:var(--green); color:#0f1117; box-shadow:0 4px 14px var(--green-glow); }
  .btn-cancel { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
  .btn-cancel:hover { color:var(--primary); border-color:var(--primary); }

  .total-row { display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:12px; margin-bottom:14px; }
  .total-label { font-size:0.82rem; color:var(--text2); }
  .total-price { font-size:1.1rem; font-weight:800; color:var(--primary); }

  .empty-col { background:var(--surface); border:1px dashed var(--border); border-radius:18px; padding:40px 20px; text-align:center; color:var(--muted); font-size:0.9rem; }
  .empty-col i { font-size:2rem; display:block; margin-bottom:12px; opacity:0.3; }

  .toast-area { position:fixed; top:80px; right:24px; z-index:999; pointer-events:none; }
  .toast-notif { background:var(--surface); border:1px solid var(--primary); border-radius:14px; padding:14px 18px; margin-bottom:10px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1); min-width:260px; }
  .toast-notif .toast-icon { width:36px; height:36px; border-radius:10px; background:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1rem; }
  .toast-title { font-size:0.9rem; font-weight:700; }
  .toast-sub { font-size:0.78rem; color:var(--text2); }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes fadeOut { to{opacity:0;transform:translateX(40px)} }
  @keyframes cardPop { from{opacity:0;transform:translateY(-10px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .card-anim { animation:cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  @media(max-width:900px) {
    .board { grid-template-columns:1fr; }
    .stats-bar { gap:8px; padding:12px 16px; }
    .header { padding:14px 16px; }
    .board { padding:16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-icon"><i class="fas fa-fire"></i></div>
    <div>
      <h1>ครัว <span>ส้มตำครกแตก</span></h1>
      <div style="font-size:0.75rem;color:var(--text2);margin-top:1px;">หน้าจอรับออเดอร์ — Real-time</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-dot">LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat new">
    <div class="stat-num" id="count-new">0</div>
    <div class="stat-label">รอรับ</div>
  </div>
  <div class="stat cooking">
    <div class="stat-num" id="count-cooking">0</div>
    <div class="stat-label">กำลังทำ</div>
  </div>
  <div class="stat done">
    <div class="stat-num" id="count-done">0</div>
    <div class="stat-label">เสร็จแล้ว</div>
  </div>
  <div class="stat" style="margin-left:auto;">
    <div class="stat-num" style="color:var(--text);font-size:1.3rem;" id="count-total">฿0</div>
    <div class="stat-label">ยอดวันนี้</div>
  </div>
</div>

<div class="toast-area" id="toast-area"></div>

<div class="board">
  <div class="col-new">
    <div class="col-header">
      <div class="col-dot" style="background:var(--primary);box-shadow:0 0 8px var(--primary-glow);"></div>
      ออเดอร์ใหม่
      <span class="col-count" id="badge-new">0</span>
    </div>
    <div id="col-new-cards">
      <div class="empty-col"><i class="fas fa-bell"></i>ยังไม่มีออเดอร์ใหม่</div>
    </div>
  </div>

  <div class="col-cooking">
    <div class="col-header">
      <div class="col-dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber-glow);"></div>
      กำลังทำ
      <span class="col-count" id="badge-cooking">0</span>
    </div>
    <div id="col-cooking-cards">
      <div class="empty-col"><i class="fas fa-fire"></i>ยังไม่มีรายการ</div>
    </div>
  </div>

  <div class="col-done">
    <div class="col-header">
      <div class="col-dot" style="background:var(--green);box-shadow:0 0 8px var(--green-glow);"></div>
      เสร็จ / เสิร์ฟแล้ว
      <span class="col-count" id="badge-done">0</span>
    </div>
    <div id="col-done-cards">
      <div class="empty-col"><i class="fas fa-check-circle"></i>ยังไม่มีรายการ</div>
    </div>
  </div>
</div>

<script>
  // ── Firebase config ──────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDCrZBU2pmTcNsA1k69u8Dx1PcwfGQldQI",
    authDomain: "somtum-order-1fdf1.firebaseapp.com",
    databaseURL: "https://somtum-order-1fdf1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "somtum-order-1fdf1",
    storageBucket: "somtum-order-1fdf1.firebasestorage.app",
    messagingSenderId: "1025067918636",
    appId: "1:1025067918636:web:ad42e2f9013417620bf889"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ── Clock ────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  setInterval(updateClock, 1000); updateClock();

  // ── Toast ────────────────────────────────────────────────
  function showToast(title, sub) {
    const area = document.getElementById('toast-area');
    const t = document.createElement('div');
    t.className = 'toast-notif';
    t.innerHTML = `<div class="toast-icon"><i class="fas fa-bell"></i></div>
      <div><div class="toast-title">${title}</div><div class="toast-sub">${sub}</div></div>`;
    area.appendChild(t);
    setTimeout(() => { t.style.animation = 'fadeOut 0.4s forwards'; setTimeout(() => t.remove(), 400); }, 4000);
  }

  // ── Build card HTML ──────────────────────────────────────
  function buildCard(key, order) {
    const itemsHtml = (order.items || []).map(i => `
      <div class="order-item">
        <div>
          <div class="item-name">${i.name}</div>
          ${i.options ? `<div class="item-opts">${i.options}</div>` : ''}
          ${i.note ? `<div class="item-opts" style="color:var(--amber);">📝 ${i.note}</div>` : ''}
        </div>
        <div class="item-qty">x${i.qty}</div>
      </div>`).join('');

    const isNew = order.status === 'new';
    const isCooking = order.status === 'cooking';

    const actionBtn = isNew
      ? `<button class="btn-action btn-accept" onclick="updateStatus('${key}','cooking')"><i class="fas fa-check"></i> รับออเดอร์</button>
         <button class="btn-action btn-cancel" onclick="deleteOrder('${key}')"><i class="fas fa-times"></i></button>`
      : isCooking
      ? `<button class="btn-action btn-done" onclick="updateStatus('${key}','done')"><i class="fas fa-bell"></i> เสร็จแล้ว</button>`
      : '';

    const timeLabel = isNew
      ? `<span class="time-ago urgent"><i class="fas fa-clock"></i> ออเดอร์ใหม่!</span>`
      : isCooking
      ? `<span class="time-ago" style="color:var(--amber)"><i class="fas fa-fire"></i> กำลังทำ</span>`
      : `<span class="time-ago" style="color:var(--green)"><i class="fas fa-check-circle"></i> เสิร์ฟแล้ว</span>`;

    return `
      <div class="order-card card-anim" id="card-${key}" style="${order.status==='done'?'opacity:0.6':''}">
        <div class="card-top">
          <div class="table-tag"><i class="fas fa-utensils"></i> โต๊ะ ${order.table}</div>
          ${timeLabel}
        </div>
        <div class="items-list">${itemsHtml}</div>
        <div class="total-row">
          <span class="total-label">ยอดรวม</span>
          <span class="total-price" style="${order.status==='done'?'color:var(--green)':''}">฿${order.total}</span>
        </div>
        ${actionBtn ? `<div class="card-actions">${actionBtn}</div>` : ''}
      </div>`;
  }

  // ── Update status ────────────────────────────────────────
  function updateStatus(key, status) {
    db.ref('orders/' + key).update({ status });
  }
  function deleteOrder(key) {
    db.ref('orders/' + key).remove();
  }

  // ── Render all ───────────────────────────────────────────
  function renderAll(orders) {
    const newCards = document.getElementById('col-new-cards');
    const cookCards = document.getElementById('col-cooking-cards');
    const doneCards = document.getElementById('col-done-cards');

    let newHtml = '', cookHtml = '', doneHtml = '';
    let cntNew = 0, cntCook = 0, cntDone = 0, totalToday = 0;

    const sorted = Object.entries(orders || {}).sort((a,b) => (b[1].timestamp||0) - (a[1].timestamp||0));

    sorted.forEach(([key, order]) => {
      const card = buildCard(key, order);
      if (order.status === 'new')     { newHtml += card; cntNew++; }
      else if (order.status === 'cooking') { cookHtml += card; cntCook++; }
      else if (order.status === 'done')    { doneHtml += card; cntDone++; totalToday += (order.total || 0); }
    });

    newCards.innerHTML  = newHtml  || '<div class="empty-col"><i class="fas fa-bell"></i>ยังไม่มีออเดอร์ใหม่</div>';
    cookCards.innerHTML = cookHtml || '<div class="empty-col"><i class="fas fa-fire"></i>ยังไม่มีรายการ</div>';
    doneCards.innerHTML = doneHtml || '<div class="empty-col"><i class="fas fa-check-circle"></i>ยังไม่มีรายการ</div>';

    document.getElementById('count-new').textContent = cntNew;
    document.getElementById('count-cooking').textContent = cntCook;
    document.getElementById('count-done').textContent = cntDone;
    document.getElementById('badge-new').textContent = cntNew;
    document.getElementById('badge-cooking').textContent = cntCook;
    document.getElementById('badge-done').textContent = cntDone;
    document.getElementById('count-total').textContent = '฿' + totalToday;
  }

  // ── Listen real-time ─────────────────────────────────────
  let prevKeys = new Set();
  db.ref('orders').on('value', snap => {
    const orders = snap.val() || {};
    const currentKeys = new Set(Object.keys(orders));

    // แจ้งเตือนเฉพาะออเดอร์ใหม่
    currentKeys.forEach(key => {
      if (!prevKeys.has(key) && orders[key].status === 'new') {
        showToast('🔔 ออเดอร์ใหม่!', `โต๊ะ ${orders[key].table} · ฿${orders[key].total}`);
        // เล่นเสียงแจ้งเตือน
        try {
          const ctx = new AudioContext();
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = 880;
          g.gain.setValueAtTime(0.3, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
          o.start(); o.stop(ctx.currentTime + 0.4);
        } catch(e) {}
      }
    });

    prevKeys = currentKeys;
    renderAll(orders);
  });
</script>
</body>
</html>
